version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: life-dashboard-db
    environment:
      POSTGRES_USER: lifeuser
      POSTGRES_PASSWORD: lifepassword
      POSTGRES_DB: lifedashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: life-dashboard-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lifeuser:lifepassword@postgres:5432/lifedashboard
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: development-secret-change-in-production
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
